<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Slider</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    font-family:Arial;
}

.container{
    width:420px;
    background:#1e293b;
    padding:20px;
    border-radius:18px;
    text-align:center;
}

img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:12px;
}

button{
    width:48%;
    padding:10px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.buttons{
    display:flex;
    justify-content:space-between;
}

</style>
</head>

<body>

<div class="container">

    <h2 style="color:white;">Image Slider</h2>

    <img id="img"
    src="https://picsum.photos/400/220?random=1">

    <div class="buttons">

        <button onclick="prevImg()">Prev</button>
        <button onclick="nextImg()">Next</button>

    </div>

</div>

<script>

let index = 1;

function nextImg(){
    index++;
    document.getElementById("img").src =
    "https://picsum.photos/400/220?random=" + index;
}

function prevImg(){
    if(index > 1) index--;
    document.getElementById("img").src =
    "https://picsum.photos/400/220?random=" + index;
}

</script>

</body>
</html>
